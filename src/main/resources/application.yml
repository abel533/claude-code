spring:
  # 主配置：使用 Anthropic 原生 API
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_BASE_URL:https://open.bigmodel.cn/api/anthropic}
      chat:
        options:
          model: ${AI_MODEL:claude-sonnet-4}
          max-tokens: ${AI_MAX_TOKENS:8096}
          temperature: 0.7
    # 备选：兼容 OpenAI 格式的 API（如自建代理）
    openai:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_OPENAI_MODEL:}

  # 不启动 Web 服务器（纯 CLI 模式）
  main:
    web-application-type: none
    banner-mode: off

  # 虚拟线程
  threads:
    virtual:
      enabled: true

# 日志：CLI 模式下只显示 WARN 及以上，保持控制台干净
logging:
  level:
    root: WARN
    com.claudecode: WARN
    org.springframework: WARN
    org.jline: WARN
